name: Daily Horizon Summary

on:
  schedule:
    # Every day at UTC 22:00 (Beijing 06:00 AM next day)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Sync Tracker sources from positions.json
        env:
          POSITIONS_JSON: ${{ vars.POSITIONS_JSON }}
        run: |
          if [ -n "$POSITIONS_JSON" ]; then
            echo "$POSITIONS_JSON" > /tmp/positions.json
            uv run python scripts/sync_tracker_sources.py /tmp/positions.json data/config.json
          else
            echo "No POSITIONS_JSON variable set, using static tracker config"
          fi

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours 24

      - name: Upload summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary-${{ github.run_id }}
          path: |
            data/summaries/
            docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "Daily Summary: $(date +'%Y-%m-%d')"
          publish_branch: gh-pages
          enable_jekyll: true

      - name: Commit updated config (if tracker sources changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/config.json
          git diff --cached --quiet || git commit -m "Auto-update tracker sources from positions.json"
          git push || true
