name: Keep Alive

on:
  schedule:
    # Run every Sunday at UTC 00:00 to keep workflows active
    - cron: '0 0 * * 0'

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keep workflow alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Touch the workflow file to trigger daily-summary via push event
          echo "# Last keep-alive: $(date -u)" > .github/.keep-alive
          git add .github/.keep-alive
          git commit -m "chore: weekly keep-alive $(date -u +'%Y-%m-%d')"
          git push
